fusion:
  generative_branch:
    weight_floor: 0.08

  soft_voting:
    weight_floor: 0.10

  meta_learner:
    type: xgboost
    params:
      n_estimators: 400   #  stronger
      max_depth: 6
      learning_rate: 0.03
      subsample: 0.9
      colsample_bytree: 0.9

  symbolic:
    weight_floor: 0.7
    max_lambda: 0.3
    lambda_steps: 30
    objective: auprc