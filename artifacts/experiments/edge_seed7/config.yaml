runtime:
  seed: 7
  smoke_test: false
  raw_data_dir: data/raw
  artifacts_dir: artifacts
  experiment_id: edge_seed7
dataset:
  version: Edge-IIoTset
  csv_file: edge_iiotset.csv
  test_size: 0.25
  val_size: 0.2
preprocessing:
  correlation_threshold: 0.985
  variance_threshold: 0.0
models:
  autoencoder:
    hidden_dim: 64
    latent_dim: 12
    dropout: 0.1
    lr: 0.001
    epochs: 60
    batch_size: 128
    denoising_sigma: 0.02
  ganomaly:
    hidden_dim: 64
    latent_dim: 12
    lr: 0.001
    epochs: 50
    batch_size: 128
    lambda_adv: 1.0
    lambda_con: 20.0
    lambda_enc: 1.0
  lstm:
    seq_len: 6
    hidden_dim: 32
    num_layers: 1
    lr: 0.001
    epochs: 30
    batch_size: 128
    dropout: 0.1
  cnn:
    channels: 16
    lr: 0.001
    epochs: 30
    batch_size: 128
    dropout: 0.1
  rf_xgb:
    random_forest:
      n_estimators: 100
      class_weight: balanced_subsample
    xgboost:
      n_estimators: 200
      max_depth: 5
      learning_rate: 0.05
      subsample: 0.9
      colsample_bytree: 0.9
      min_child_weight: 1.0
      reg_lambda: 1.0
fusion:
  generative_branch:
    weight_floor: 0.08
  soft_voting:
    weight_floor: 0.1
  meta_learner:
    type: logistic_regression
  symbolic:
    weight_floor: 0.7
    max_lambda: 0.3
    lambda_steps: 25
    objective: auprc
evaluation:
  threshold:
    recall_floor: 0.88
    far_ceiling: 0.15
    grid_size: 101
