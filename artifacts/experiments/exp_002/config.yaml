runtime:
  seed: 42
  smoke_test: false
  raw_data_dir: data/raw
  artifacts_dir: artifacts
  experiment_id: null
dataset:
  version: NSL-KDD
  train_file: NSL_KDD_Train.csv
  test_file: NSL_KDD_Test.csv
  val_size: 0.2
  smoke_train_rows: 300
  smoke_test_rows: 120
preprocessing:
  correlation_threshold: 0.985
  variance_threshold: 0.0
models:
  autoencoder:
    hidden_dim: 64
    latent_dim: 12
    dropout: 0.1
    lr: 0.001
    epochs: 6
    batch_size: 64
    denoising_sigma: 0.02
  ganomaly:
    hidden_dim: 64
    latent_dim: 12
    lr: 0.001
    epochs: 4
    batch_size: 64
    lambda_adv: 1.0
    lambda_con: 20.0
    lambda_enc: 1.0
  lstm:
    seq_len: 6
    hidden_dim: 32
    num_layers: 1
    lr: 0.001
    epochs: 3
    batch_size: 64
    dropout: 0.1
  cnn:
    channels: 16
    lr: 0.001
    epochs: 3
    batch_size: 64
    dropout: 0.1
  rf_xgb:
    random_forest:
      n_estimators: 60
      class_weight: balanced_subsample
    xgboost:
      n_estimators: 60
      max_depth: 4
      learning_rate: 0.08
      subsample: 0.9
      colsample_bytree: 0.9
      min_child_weight: 1.0
      reg_lambda: 1.0
fusion:
  generative_branch:
    weight_floor: 0.08
  soft_voting:
    weight_floor: 0.1
  meta_learner:
    type: logistic_regression
  symbolic:
    weight_floor: 0.05
    max_lambda: 0.5
    lambda_steps: 21
    objective: auprc
evaluation:
  threshold:
    recall_floor: 0.9
    far_ceiling: 0.25
    grid_size: 101
methods:
  clafpp: {}
